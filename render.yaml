databases:
  - name: bulk-tracking-db
    plan: free
    databaseName: bulk_tracking
    user: bulk_tracking

services:
  - type: web
    name: bulk-tracking-uploader
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bulk-tracking-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        value: https://bulk-tracking-uploader.onrender.com
      - key: SCOPES
        value: write_products,write_metaobjects,write_metaobject_definitions,read_orders,write_orders,read_fulfillments,write_fulfillments,read_merchant_managed_fulfillment_orders,write_merchant_managed_fulfillment_orders,read_assigned_fulfillment_orders,write_assigned_fulfillment_orders
